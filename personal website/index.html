<!DOCTYPE html>
<html lang="en">
    <head>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <link rel="stylesheet" href="assets/css/style.css">
        <title>Title</title>

        <!-- google font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>

        body {
            font-family: Unica One;
            background: radial-gradient(circle, #4cb49f, #072a2b);
            height: 100%;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .name {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 180px;
            letter-spacing: -10px;
            color: #ffff;
            text-shadow: 0 3px 4px rgb(4, 29, 6);
            margin-top: -180px;
        }

        . name-w {
            transition: box-shadow 0.3s; /* 這能確保平滑過渡 */
        }
    
        .nav {
            font-size: 25px;
            letter-spacing: -2px;
            color: rgb(255, 255, 255);
        }
    
        .nav {
            display: flex;       /* 啟用 Flexbox 排版 */
            gap: 170px;           /* 設定每個連結之間的間距 (你可以根據需求調整數值) */
            align-items: center; /* 讓內容垂直居中 */
            margin-bottom: -50px;
        }
    
        .nav a {
            /* text-decoration: none; */ /* 如果你想移除預設的底線，可以加上這一行 */
            color: inherit;        /* 確保連結顏色與文字設定一致 */
        }

        .container-fluid {
            color: #ffff;
        }
    
    
    </style>
    

    <body>

        <nav style="display: flex; justify-content: space-between;" class="navbar navbar-expand-sm bg-dark navbar-dark">
            <!-- Brand/logo -->
            <a class="navbar-brand" href="#">Logo</a>
            
            <!-- Links -->
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="#">Link 1</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link 2</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link 3</a>
              </li>
            </ul>
        </nav>

        <br>

        <div class="container-fluid">
        <h3>Brand / Logo</h3>
        <p>The .navbar-brand class is used to highlight the brand/logo/project name ofyour page.</p>
        </div>

        <div class="name">
        
            <div class="nav">
                <a href="">HOME </a>
                <a href="">ABOUT </a>
                <a href="">WORK </a>
                <a href="">CONTACT</a>
            </div>
            
                <span class="name-w"><b>TIMOTHYTAM</b></span>
                <span class="name-w"style="font-size: 115px; line-height: .1px; margin-top: -7px;">FRONTENDDEVELOPER</span>
        
        </div>




        <link rel="preconnect" href="https://fonts.googleapis.com">

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

        <script src="app.js"></script>



    </body>
