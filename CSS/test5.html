<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

</head>

<style>

body {
    font-family: Google Sans;
}

.form-container {
    background-color: #d2f865;
    padding: 24px;
    border-radius: 8px;
    width: 100%;
    max-width: 450px;
}

.form-row {
    display: flex;
    gap: 16px;
}

.form-group, .form-email {
    flex: 2;
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-size: 14px;
    color: #111827;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    background-color: #ffffff;
    color: #1f2937;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid transparent;
    outline: none;
    font-size: 14px;
    box-sizing: border-box;
}

.form-group input::placeholder {
    color: #bfc3c9;
}

.form-email {
    margin: 20px 0;
}

.form-email label {
    font-size: 14px;
    color: #111827;
    margin-bottom: 6px;
}


.form-email input {
    width: 100%;
    background-color: #ffffff;
    color: #1f2937;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid transparent;
    outline: none;
    font-size: 14px;
    box-sizing: border-box;
}
















</style>



<body>
    <form>
        <div class="form-container">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
            </div>
            <div class="form-email">
                <label>Email</label>
                <input type="email" placeholder="Email address">
            </div>
            <div>
                <label for="fruit">Tell us what excites you</label><br>
                <select>
                        <option value="at">Adventure Travel</option>
                        <option value="bt">Budget Tips</option>
                        <option value="le">Luxury Escapes</option>
                        <option value="hg">Hidden Gems</option>
                        <option value="ft">Family Trips</option>
                        <option value="st">Solo Travel</option>
                </select>
            </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First Name">
                </div>
            </div>
            <br>
            <br>
            <input class="submit" type="button" value="Submit">
        </div>


    </form>





</body>
</html>
